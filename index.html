<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multi‑tone generator · 1Hz – 40kHz (concurrent)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }
        .card {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 1.8rem 2rem 2.2rem;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.2rem 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            background: #e9eef2;
            color: #334155;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .status-bar {
            background: #eef2f6;
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            margin: 1.2rem 0 1.8rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .now-playing {
            font-weight: 500;
            color: #0b3b5c;
            background: #d9e2ec;
            padding: 0.25rem 1.2rem;
            border-radius: 30px;
            font-size: 1.1rem;
            min-width: 200px;
        }
        .btn-stop {
            background: #d44c4c;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #8b2e2e;
            transition: 0.08s linear;
            border: 1px solid #b33b3b;
        }
        .btn-stop:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .btn-stop:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 3px 0 #8b2e2e;
            pointer-events: none;
        }
        .freq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 12px;
            margin-top: 5px;
        }
        .freq-btn {
            background: #ffffff;
            border: 2px solid #cad5df;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e3a5f;
            box-shadow: 0 4px 0 #9aaebf;
            cursor: pointer;
            transition: 0.06s linear;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 0.3px;
        }
        .freq-btn.active {
            background: #a3d0ff;
            border-color: #2c5f8a;
            color: #0b2b44;
            box-shadow: 0 2px 0 #1f4a6e;
            transform: translateY(2px);
        }
        .freq-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #556b7c;
            background: #eef3f7;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        🎛️ concurrent oscillators
        <small>1 Hz … 40 kHz · toggle each</small>
    </h1>

    <div class="status-bar">
        <span class="now-playing" id="nowPlayingLabel">⏸️ stopped</span>
        <button class="btn-stop" id="stopButton" aria-label="stop all tones">🔇 STOP ALL</button>
    </div>

    <div id="buttonContainer" class="freq-grid">
        <!-- buttons will be injected via javascript -->
    </div>

    <div class="note">
        ⚡ <strong>click any frequency to toggle on/off</strong> – multiple tones play simultaneously.  
        1 Hz & 10 Hz are very low (barely audible). Frequencies above ~20 kHz may be silent on many devices.
    </div>
</div>

<script>
    (function() {
        // ---------- FREQUENCY LIST (Hz) — 1 Hz to 40 kHz in steps ----------
        const freqData = [
            // low frequencies
            { label: "1 Hz", value: 1 },
            { label: "10 Hz", value: 10 },
            { label: "100 Hz", value: 100 },
            // 1 kHz … 22 kHz
            { label: "1 kHz", value: 1000 },
            { label: "2 kHz", value: 2000 },
            { label: "3 kHz", value: 3000 },
            { label: "4 kHz", value: 4000 },
            { label: "5 kHz", value: 5000 },
            { label: "6 kHz", value: 6000 },
            { label: "7 kHz", value: 7000 },
            { label: "8 kHz", value: 8000 },
            { label: "9 kHz", value: 9000 },
            { label: "10 kHz", value: 10000 },
            { label: "11 kHz", value: 11000 },
            { label: "12 kHz", value: 12000 },
            { label: "13 kHz", value: 13000 },
            { label: "14 kHz", value: 14000 },
            { label: "15 kHz", value: 15000 },
            { label: "16 kHz", value: 16000 },
            { label: "17 kHz", value: 17000 },
            { label: "18 kHz", value: 18000 },
            { label: "19 kHz", value: 19000 },
            { label: "20 kHz", value: 20000 },
            { label: "21 kHz", value: 21000 },
            { label: "22 kHz", value: 22000 }
        ];

        // append 23 kHz to 40 kHz in 1 kHz steps
        for (let khz = 23; khz <= 40; khz++) {
            freqData.push({
                label: khz + " kHz",
                value: khz * 1000
            });
        }

        // ---------- Web Audio variables ----------
        let audioCtx = null;
        // active oscillators: array of { freq, osc, gain, button }
        let activeTones = [];

        // UI elements
        const nowPlayingSpan = document.getElementById('nowPlayingLabel');
        const stopBtn = document.getElementById('stopButton');
        const container = document.getElementById('buttonContainer');

        // ---------- helper: get or create AudioContext ----------
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        // ---------- update status label based on active tones ----------
        function updateNowPlaying() {
            if (activeTones.length === 0) {
                nowPlayingSpan.innerText = '⏸️ stopped';
            } else {
                const count = activeTones.length;
                // list first two frequencies as example
                const freqList = activeTones.slice(0, 3).map(t => {
                    const f = t.freq;
                    return f >= 1000 ? (f/1000 + ' kHz') : f + ' Hz';
                }).join(', ');
                const more = activeTones.length > 3 ? ` +${activeTones.length-3}` : '';
                nowPlayingSpan.innerText = `🔊 ${count} tone${count>1?'s':''} · ${freqList}${more}`;
            }
        }

        // ---------- stop a specific tone (removes from activeTones, unhighlights button) ----------
        function stopTone(tone) {
            try {
                tone.osc.stop();
                tone.osc.disconnect();
            } catch (e) {}
            try {
                tone.gain.disconnect();
            } catch (e) {}
            if (tone.button) {
                tone.button.classList.remove('active');
            }
            // remove from activeTones array
            const index = activeTones.indexOf(tone);
            if (index !== -1) activeTones.splice(index, 1);
            updateNowPlaying();
        }

        // ---------- stop all tones ----------
        function stopAllTones() {
            // make a copy because activeTones will be modified during iteration
            const tonesCopy = [...activeTones];
            for (let tone of tonesCopy) {
                stopTone(tone);
            }
        }

        // ---------- toggle a frequency (start if not playing, stop if playing) ----------
        async function toggleFrequency(freqHz, buttonElement) {
            const ctx = getAudioContext();

            // resume context if suspended (user gesture)
            if (ctx.state === 'suspended') {
                try {
                    await ctx.resume();
                } catch (e) {
                    console.warn('could not resume audio context', e);
                    return;
                }
            }

            // check if this frequency is already active
            const existingTone = activeTones.find(t => t.freq === freqHz);
            if (existingTone) {
                // stop this tone (toggle off)
                stopTone(existingTone);
                return;
            }

            // --- start new tone ---
            // create gain node (volume per oscillator reduced to avoid clipping)
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);  // moderate level
            gainNode.connect(ctx.destination);

            // create sine oscillator
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freqHz, ctx.currentTime);

            // connect and start
            osc.connect(gainNode);
            osc.start();

            // store tone data
            const newTone = {
                freq: freqHz,
                osc: osc,
                gain: gainNode,
                button: buttonElement
            };
            activeTones.push(newTone);
            buttonElement.classList.add('active');

            // remove the tone automatically if the oscillator stops (e.g., via external stop)
            osc.onended = () => {
                // if this oscillator is still in activeTones, remove it
                const index = activeTones.findIndex(t => t.osc === osc);
                if (index !== -1) {
                    const tone = activeTones[index];
                    if (tone.button) tone.button.classList.remove('active');
                    activeTones.splice(index, 1);
                    updateNowPlaying();
                }
            };

            updateNowPlaying();
        }

        // ---------- create all buttons ----------
        freqData.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'freq-btn';
            btn.textContent = item.label;
            btn.setAttribute('data-freq', item.value);

            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                await toggleFrequency(item.value, btn);
            });

            container.appendChild(btn);
        });

        // ---------- stop button: kill all ----------
        stopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            stopAllTones();
        });

        // ---------- clean up on page unload ----------
        window.addEventListener('beforeunload', () => {
            stopAllTones();  // stops all and disconnects
            if (audioCtx && audioCtx.state !== 'closed') {
                audioCtx.close();
            }
        });

        // ---------- initial state: none playing ----------
        updateNowPlaying();
    })();
</script>
</body>
</html>
