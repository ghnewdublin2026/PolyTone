<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyTone · 1Hz–40kHz + pink gain + tremolo</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }
        .card {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 1.8rem 2rem 2.2rem;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 0.2rem 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            background: #e9eef2;
            color: #334155;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }
        .status-bar {
            background: #eef2f6;
            border-radius: 60px;
            padding: 0.5rem 1.5rem;
            margin: 1.2rem 0 1.2rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .now-playing {
            font-weight: 500;
            color: #0b3b5c;
            background: #d9e2ec;
            padding: 0.25rem 1.2rem;
            border-radius: 30px;
            font-size: 1.1rem;
            min-width: 200px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-play-all {
            background: #2e7d5e;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #1b4f3b;
            transition: 0.08s linear;
            border: 1px solid #1f5e45;
        }
        .btn-play-all:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .btn-stop {
            background: #d44c4c;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 0 #8b2e2e;
            transition: 0.08s linear;
            border: 1px solid #b33b3b;
        }
        .btn-stop:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        /* control panels */
        .control-panel {
            background: #e9f0f5;
            border-radius: 50px;
            padding: 0.8rem 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .control-group label {
            font-weight: 600;
            color: #1e3f5c;
        }
        .select-styled, .input-styled {
            background: white;
            border: 2px solid #b7c9da;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-weight: 500;
            color: #0b2b44;
            cursor: pointer;
            outline: none;
        }
        .input-styled {
            width: 90px;
            text-align: center;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .freq-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 5px;
        }
        .freq-btn {
            background: #ffffff;
            border: 2px solid #cad5df;
            border-radius: 60px;
            padding: 14px 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e3a5f;
            box-shadow: 0 4px 0 #9aaebf;
            cursor: pointer;
            transition: 0.06s linear;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 0.3px;
        }
        .freq-btn.active {
            background: #a3d0ff;
            border-color: #2c5f8a;
            color: #0b2b44;
            box-shadow: 0 2px 0 #1f4a6e;
            transform: translateY(2px);
        }
        .freq-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #556b7c;
            background: #eef3f7;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>
        🎛️ PolyTone
        <small>1 Hz … 40 kHz · pink gain · tremolo</small>
    </h1>

    <div class="status-bar">
        <span class="now-playing" id="nowPlayingLabel">⏸️ stopped</span>
        <div class="action-buttons">
            <button class="btn-play-all" id="playAllButton" aria-label="play all frequencies">▶ PLAY ALL</button>
            <button class="btn-stop" id="stopButton" aria-label="stop all tones">🔇 STOP ALL</button>
        </div>
    </div>

    <!-- compressor controls -->
    <div class="control-panel">
        <div class="control-group">
            <label for="placementSelect">📍 Placement</label>
            <select id="placementSelect" class="select-styled">
                <option value="master">Master (mix)</option>
                <option value="per">Per oscillator</option>
            </select>
        </div>
        <div class="control-group">
            <label for="modeSelect">🎚️ Mode</label>
            <select id="modeSelect" class="select-styled">
                <option value="off">Off</option>
                <option value="default">Default</option>
                <option value="min">Min</option>
            </select>
        </div>
    </div>

    <!-- tremolo controls -->
    <div class="control-panel">
        <div class="checkbox-group">
            <input type="checkbox" id="tremoloEnable" />
            <label for="tremoloEnable">🌀 Tremolo (sine modulation)</label>
        </div>
        <div class="control-group">
            <label for="tremoloPeriod">Period (s)</label>
            <input type="number" id="tremoloPeriod" class="input-styled" min="0.1" max="10" step="0.1" value="2.0" disabled>
        </div>
        <div class="control-group">
            <label for="tremoloDepth">Depth (%)</label>
            <input type="number" id="tremoloDepth" class="input-styled" min="0" max="100" step="1" value="50" disabled>
        </div>
    </div>

    <div id="buttonContainer" class="freq-grid">
        <!-- buttons will be injected via javascript -->
    </div>

    <div class="note">
        ⚡ <strong>pink‑weighted gain</strong> (0.05 base, ∝ 1/√f). Tremolo modulates master volume with a sine wave.  
        Click any frequency to toggle on/off. <strong>PLAY ALL</strong> starts every frequency.
    </div>
</div>

<script>
    (function() {
        // ==================== CONFIGURATION ====================
        function gainForFrequency(freq) {
            const baseGain = 0.05;
            if (freq <= 1000) return baseGain;
            return baseGain * Math.sqrt(1000 / freq);
        }

        const compressorPresets = {
            off: null,
            default: { threshold: -20, ratio: 4, attack: 0.003, release: 0.25, knee: 30 },
            min: { threshold: -6, ratio: 1.5, attack: 0.01, release: 0.1, knee: 20 }
        };

        // ==================== FREQUENCY LIST ====================
        const lowFreqs = [1, 10, 100];
        const highFreqs = [];
        for (let f = 1000; f <= 40000; f += 500) highFreqs.push(f);
        const allFreqs = [...lowFreqs, ...highFreqs];
        const freqItems = allFreqs.map(freq => {
            let label;
            if (freq < 1000) label = `${freq} Hz`;
            else if (freq % 1000 === 0) label = `${freq / 1000} kHz`;
            else label = `${(freq / 1000).toFixed(1)} kHz`;
            return { freq, label };
        });

        // ==================== TONE MANAGER with TREMOLO ====================
        class ToneManager {
            constructor() {
                this.audioCtx = null;
                this.activeTones = new Map(); // freq -> { oscillator, gainNode, button, compressor (if per) }
                this.statusCallback = null;

                // compressor state
                this.compressorMode = 'off';
                this.compressorPlacement = 'master';
                this.masterCompressor = null;

                // tremolo state
                this.tremoloEnabled = false;
                this.tremoloPeriod = 2.0;   // seconds
                this.tremoloDepth = 50;      // percent
                this.tremoloGain = null;      // GainNode for master volume
                this.tremoloLFO = null;       // OscillatorNode for modulation
                this.tremoloScale = null;      // GainNode to scale LFO
            }

            async ensureContext() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioCtx.state === 'suspended') {
                    try {
                        await this.audioCtx.resume();
                    } catch (e) {
                        console.warn('Failed to resume audio context', e);
                        throw e;
                    }
                }
                return this.audioCtx;
            }

            #applyCompressorSettings(compNode, mode) {
                if (!compNode || mode === 'off') return;
                const preset = compressorPresets[mode];
                if (!preset) return;
                compNode.threshold.setValueAtTime(preset.threshold, this.audioCtx.currentTime);
                compNode.ratio.setValueAtTime(preset.ratio, this.audioCtx.currentTime);
                compNode.attack.setValueAtTime(preset.attack, this.audioCtx.currentTime);
                compNode.release.setValueAtTime(preset.release, this.audioCtx.currentTime);
                compNode.knee.setValueAtTime(preset.knee, this.audioCtx.currentTime);
            }

            // Rebuild entire audio graph (compressor + tremolo)
            async reconfigureAll(compPlacement, compMode, tremEnable, tremPeriod, tremDepth) {
                if (!this.audioCtx) return;

                const oldPlacement = this.compressorPlacement;
                const oldMode = this.compressorMode;
                const oldTremEnable = this.tremoloEnabled;
                const oldTremPeriod = this.tremoloPeriod;
                const oldTremDepth = this.tremoloDepth;

                this.compressorPlacement = compPlacement;
                this.compressorMode = compMode;
                this.tremoloEnabled = tremEnable;
                this.tremoloPeriod = tremPeriod;
                this.tremoloDepth = tremDepth;

                // If no active tones, just set up master nodes for future starts
                if (this.activeTones.size === 0) {
                    this.#rebuildMasterNodes();
                    return;
                }

                // Save active frequencies and buttons
                const activeFreqs = Array.from(this.activeTones.keys());
                const activeButtons = activeFreqs.map(f => this.activeTones.get(f).button);

                // Stop all tones quietly
                for (const freq of activeFreqs) {
                    this.#removeTone(freq, false, true);
                }

                // Rebuild master nodes
                this.#rebuildMasterNodes();

                // Restart all tones
                for (let i = 0; i < activeFreqs.length; i++) {
                    await this.#startTone(activeFreqs[i], activeButtons[i], true);
                }
                this.#updateStatus();
            }

            // Create or update master compressor and tremolo nodes
            #rebuildMasterNodes() {
                // Clean up existing master nodes
                if (this.masterCompressor) {
                    try { this.masterCompressor.disconnect(); } catch (e) {}
                    this.masterCompressor = null;
                }
                if (this.tremoloGain) {
                    try { this.tremoloGain.disconnect(); } catch (e) {}
                    this.tremoloGain = null;
                }
                if (this.tremoloLFO) {
                    try { this.tremoloLFO.stop(); this.tremoloLFO.disconnect(); } catch (e) {}
                    this.tremoloLFO = null;
                }
                if (this.tremoloScale) {
                    try { this.tremoloScale.disconnect(); } catch (e) {}
                    this.tremoloScale = null;
                }

                const ctx = this.audioCtx;
                if (!ctx) return;

                // Create master compressor if needed
                if (this.compressorPlacement === 'master' && this.compressorMode !== 'off') {
                    this.masterCompressor = ctx.createDynamicsCompressor();
                    this.#applyCompressorSettings(this.masterCompressor, this.compressorMode);
                }

                // Create tremolo gain if enabled
                if (this.tremoloEnabled) {
                    this.tremoloGain = ctx.createGain();
                    // Base gain = 1 - depth/2
                    const base = 1 - (this.tremoloDepth / 200); // depth/200 because depth% -> /100 then /2
                    this.tremoloGain.gain.setValueAtTime(base, ctx.currentTime);

                    // Create LFO: sine oscillator at 1/period Hz
                    this.tremoloLFO = ctx.createOscillator();
                    this.tremoloLFO.type = 'sine';
                    this.tremoloLFO.frequency.setValueAtTime(1 / this.tremoloPeriod, ctx.currentTime);

                    // Scale LFO: depth/2 (as amplitude)
                    this.tremoloScale = ctx.createGain();
                    const amp = this.tremoloDepth / 200; // depth% / 100 / 2
                    this.tremoloScale.gain.setValueAtTime(amp, ctx.currentTime);

                    // Connect: LFO -> scale -> gain param (adds to base)
                    this.tremoloLFO.connect(this.tremoloScale);
                    this.tremoloScale.connect(this.tremoloGain.gain);

                    this.tremoloLFO.start();
                }

                // Connect master chain: (incoming connections will be made by each tone)
                // The final destination is either tremoloGain or masterCompressor or ctx.destination
                // We'll handle per-tone connection in #startTone
            }

            // Start a tone with current graph configuration
            async #startTone(freq, button, skipStatus = false) {
                const ctx = this.audioCtx;
                const gainValue = gainForFrequency(freq);
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(gainValue, ctx.currentTime);

                const oscillator = ctx.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, ctx.currentTime);
                oscillator.connect(gainNode);

                // Determine where to connect gainNode
                let destination = ctx.destination;
                if (this.tremoloGain) {
                    destination = this.tremoloGain;
                }
                if (this.compressorPlacement === 'master' && this.masterCompressor) {
                    // master compressor before tremolo? We'll put compressor before tremolo.
                    // So gain -> masterCompressor -> (maybe tremolo) -> destination
                    if (this.tremoloGain) {
                        gainNode.connect(this.masterCompressor);
                        this.masterCompressor.connect(this.tremoloGain);
                        // tremoloGain already connected to destination
                    } else {
                        gainNode.connect(this.masterCompressor);
                        this.masterCompressor.connect(ctx.destination);
                    }
                } else if (this.compressorPlacement === 'per' && this.compressorMode !== 'off') {
                    const perComp = ctx.createDynamicsCompressor();
                    this.#applyCompressorSettings(perComp, this.compressorMode);
                    gainNode.connect(perComp);
                    if (this.tremoloGain) {
                        perComp.connect(this.tremoloGain);
                    } else {
                        perComp.connect(ctx.destination);
                    }
                    oscillator.compressor = perComp; // store for cleanup
                } else {
                    // no per-compressor
                    if (this.tremoloGain) {
                        gainNode.connect(this.tremoloGain);
                    } else {
                        gainNode.connect(ctx.destination);
                    }
                }

                // If tremoloGain exists and not yet connected to destination, connect it now (should be once)
                if (this.tremoloGain && !this.tremoloGain._connected) {
                    this.tremoloGain.connect(ctx.destination);
                    this.tremoloGain._connected = true; // simple flag to avoid multiple connects
                }

                oscillator.start();

                const toneObj = { oscillator, gainNode, button };
                if (this.compressorPlacement === 'per' && this.compressorMode !== 'off') {
                    toneObj.compressor = oscillator.compressor;
                }
                this.activeTones.set(freq, toneObj);
                button.classList.add('active');

                oscillator.onended = () => {
                    this.#removeTone(freq, true);
                };

                if (!skipStatus) this.#updateStatus();
            }

            #removeTone(freq, alreadyStopped = false, skipStatus = false) {
                const tone = this.activeTones.get(freq);
                if (!tone) return;

                if (!alreadyStopped) {
                    try {
                        tone.oscillator.stop();
                        tone.oscillator.disconnect();
                        tone.gainNode.disconnect();
                        if (tone.compressor) tone.compressor.disconnect();
                    } catch (e) {}
                }

                tone.button.classList.remove('active');
                this.activeTones.delete(freq);
                if (!skipStatus) this.#updateStatus();
            }

            async toggle(freq, button) {
                try {
                    await this.ensureContext();
                } catch (e) {
                    return;
                }
                if (this.activeTones.has(freq)) {
                    this.#removeTone(freq);
                } else {
                    await this.#startTone(freq, button);
                }
            }

            stopAll() {
                for (const freq of Array.from(this.activeTones.keys())) {
                    this.#removeTone(freq, false, true);
                }
                this.#updateStatus();
            }

            async playAll(buttons) {
                await this.ensureContext();
                for (const btn of buttons) {
                    const freq = parseFloat(btn.dataset.freq);
                    if (!this.activeTones.has(freq)) {
                        await this.#startTone(freq, btn, true);
                    }
                }
                this.#updateStatus();
            }

            // Setters for UI controls
            async setCompressorMode(mode) {
                await this.reconfigureAll(this.compressorPlacement, mode, this.tremoloEnabled, this.tremoloPeriod, this.tremoloDepth);
            }
            async setCompressorPlacement(placement) {
                await this.reconfigureAll(placement, this.compressorMode, this.tremoloEnabled, this.tremoloPeriod, this.tremoloDepth);
            }
            async setTremolo(enable, period, depth) {
                await this.reconfigureAll(this.compressorPlacement, this.compressorMode, enable, period, depth);
            }

            onStatusChange(callback) {
                this.statusCallback = callback;
            }

            #updateStatus() {
                if (this.statusCallback) {
                    const active = Array.from(this.activeTones.values()).map(t => t.oscillator.frequency.value);
                    this.statusCallback(active);
                }
            }

            dispose() {
                this.stopAll();
                if (this.tremoloLFO) {
                    try { this.tremoloLFO.stop(); } catch (e) {}
                }
                if (this.audioCtx && this.audioCtx.state !== 'closed') {
                    this.audioCtx.close();
                }
            }
        }

        // ==================== UI MANAGER ====================
        class UIManager {
            constructor(containerId, statusSpanId, stopBtnId, playAllBtnId, 
                        placementSelectId, modeSelectId,
                        tremEnableId, tremPeriodId, tremDepthId, toneManager) {
                this.container = document.getElementById(containerId);
                this.statusSpan = document.getElementById(statusSpanId);
                this.stopBtn = document.getElementById(stopBtnId);
                this.playAllBtn = document.getElementById(playAllBtnId);
                this.placementSelect = document.getElementById(placementSelectId);
                this.modeSelect = document.getElementById(modeSelectId);
                this.tremEnable = document.getElementById(tremEnableId);
                this.tremPeriod = document.getElementById(tremPeriodId);
                this.tremDepth = document.getElementById(tremDepthId);
                this.toneManager = toneManager;

                this.toneManager.onStatusChange((activeFreqs) => this.updateStatus(activeFreqs));

                this.stopBtn.addEventListener('click', () => this.toneManager.stopAll());
                this.playAllBtn.addEventListener('click', async () => {
                    const allButtons = Array.from(this.container.querySelectorAll('.freq-btn'));
                    await this.toneManager.playAll(allButtons);
                });

                // Compressor controls
                this.placementSelect.addEventListener('change', async (e) => {
                    await this.toneManager.setCompressorPlacement(e.target.value);
                });
                this.modeSelect.addEventListener('change', async (e) => {
                    await this.toneManager.setCompressorMode(e.target.value);
                });

                // Tremolo controls
                const updateTremolo = async () => {
                    const enabled = this.tremEnable.checked;
                    const period = parseFloat(this.tremPeriod.value) || 2.0;
                    const depth = parseFloat(this.tremDepth.value) || 0;
                    await this.toneManager.setTremolo(enabled, period, depth);
                };

                this.tremEnable.addEventListener('change', (e) => {
                    const disabled = !e.target.checked;
                    this.tremPeriod.disabled = disabled;
                    this.tremDepth.disabled = disabled;
                    updateTremolo();
                });
                this.tremPeriod.addEventListener('input', updateTremolo);
                this.tremDepth.addEventListener('input', updateTremolo);

                this.buttons = [];
            }

            buildButtons(items) {
                items.forEach(({ freq, label }) => {
                    const btn = document.createElement('button');
                    btn.className = 'freq-btn';
                    btn.textContent = label;
                    btn.dataset.freq = freq;

                    btn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await this.toneManager.toggle(freq, btn);
                    });

                    this.container.appendChild(btn);
                    this.buttons.push(btn);
                });
            }

            updateStatus(activeFreqs) {
                if (activeFreqs.length === 0) {
                    this.statusSpan.innerText = '⏸️ stopped';
                } else {
                    const count = activeFreqs.length;
                    const displayFreqs = activeFreqs.slice(0, 3).map(f => {
                        return f >= 1000 ? (f / 1000 + ' kHz') : f + ' Hz';
                    }).join(', ');
                    const more = activeFreqs.length > 3 ? ` +${activeFreqs.length - 3}` : '';
                    this.statusSpan.innerText = `🔊 ${count} tone${count > 1 ? 's' : ''} · ${displayFreqs}${more}`;
                }
            }
        }

        // ==================== INITIALIZATION ====================
        const toneManager = new ToneManager();
        const uiManager = new UIManager(
            'buttonContainer',
            'nowPlayingLabel',
            'stopButton',
            'playAllButton',
            'placementSelect',
            'modeSelect',
            'tremoloEnable',
            'tremoloPeriod',
            'tremoloDepth',
            toneManager
        );
        uiManager.buildButtons(freqItems);

        // Initial state
        toneManager.compressorPlacement = 'master';
        toneManager.compressorMode = 'off';
        toneManager.tremoloEnabled = false;

        window.addEventListener('beforeunload', () => {
            toneManager.dispose();
        });
    })();
</script>
</body>
</html>
